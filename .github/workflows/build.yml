jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Cette étape est INDISPENSABLE pour copier vos fichiers

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # ou la version requise par votre mod
          distribution: 'temurin'

      - name: Build with Gradle
        # Si vos fichiers sont à la racine, supprimez "cd cockatiel-mod &&"
        run: ./gradlew build
