name: Build Cockatiel Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build with Gradle
        run: cd cockatiel-mod && gradle build

      - name: List ALL jar files
        run: find . -name "*.jar" 2>/dev/null | grep -v ".gradle" | grep -v "cache"

      - name: List build directory
        run: ls -la cockatiel-mod/build/ 2>/dev/null || echo "No build folder found at cockatiel-mod/build/"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cockatiel-mod-jar
          path: '**/build/libs/*.jar'
          if-no-files-found: warn
